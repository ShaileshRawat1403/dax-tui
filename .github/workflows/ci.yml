name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
      - docs/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check repo integrity
        run: bun run check:repo

      - name: Guard frozen legacy roots
        run: bun run guard:legacy

      - name: Typecheck
        run: bun run typecheck:dax

      - name: Test
        run: bun run test
